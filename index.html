<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态粒子特效</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at top left, rgba(0, 255, 204, .18), transparent 28%), radial-gradient(circle at bottom right, rgba(32, 139, 255, .16), transparent 30%), #07101f;
            color: #eef7ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        .logo-container {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
        }
        .logo-container img {
            width: 120px;
            height: auto;
            display: block;
        }
        .nav {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 18px;
            z-index: 10;
        }
        .nav a {
            color: rgba(255,255,255,.78);
            text-decoration: none;
            font-weight: 600;
            padding: 10px 14px;
            border-radius: 999px;
            transition: background .2s ease, color .2s ease;
        }
        .nav a:hover { background: rgba(255,255,255,.08); color: #fff; }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(880px, calc(100% - 60px));
            padding: 36px 40px;
            z-index: 5;
            display: grid;
            gap: 20px;
            text-align: center;
            background: rgba(9,16,29,.52);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 30px;
            backdrop-filter: blur(18px);
            box-shadow: 0 30px 120px rgba(0,0,0,.28);
        }
        .content h1 {
            margin: 0;
            font-size: clamp(2.6rem, 4vw, 4.2rem);
            line-height: 1.02;
            letter-spacing: .12em;
        }
        .content p {
            margin: 0;
            color: #b6d2ea;
            line-height: 1.8;
            font-size: 1.05rem;
        }
        .cta-group {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 180px;
            padding: 16px 26px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(0,255,204,.14);
            color: #061828;
            font-weight: 700;
            text-decoration: none;
            transition: transform .2s ease, background .2s ease;
        }
        .cta:hover { transform: translateY(-2px); background: rgba(0,255,204,.24); }
        .secondary { background: rgba(255,255,255,.08); color: #eef7ff; }
        .secondary:hover { background: rgba(255,255,255,.14); }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" alt="学校标志">
    </div>

    <nav class="nav">
        <a href="school.html">学校案例</a>
        <a href="works.html">作品集</a>
        <a href="contact.html">联系</a>
    </nav>

    <div class="content">
        <h1>为教育项目打造高级展示页</h1>
        <p>你的作品集首页现在已连接到学校案例与作品页，设计保留了动态粒子效果，同时提供更清晰的入口与品牌导航。</p>
        <div class="cta-group">
            <a class="cta" href="school.html">查看学校案例</a>
            <a class="cta secondary" href="works.html">浏览作品集</a>
        </div>
    </div>

    <canvas id="particleCanvas"></canvas>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        // 设置画布大小为窗口大小
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;

        // 记录鼠标位置
        let mouse = {
            x: null,
            y: null,
            radius: 150 // 鼠标交互的影响范围
        }

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        // 窗口大小改变时重置画布
        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        // 创建粒子类
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }

            // 绘制粒子
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            // 更新粒子位置并检测边缘碰撞和鼠标交互
            update() {
                // 碰到边缘反弹
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                // 碰撞检测：鼠标位置与粒子的互动 (排斥效果)
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius + this.size) {
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) {
                        this.x += 3;
                    }
                    if (mouse.x > this.x && this.x > this.size * 10) {
                        this.x -= 3;
                    }
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) {
                        this.y += 3;
                    }
                    if (mouse.y > this.y && this.y > this.size * 10) {
                        this.y -= 3;
                    }
                }

                // 移动粒子
                this.x += this.directionX;
                this.y += this.directionY;

                // 绘制
                this.draw();
            }
        }

        // 初始化粒子数组
        function init() {
            particlesArray = [];
            // 根据屏幕大小计算粒子数量
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1; // 粒子大小 1-3
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1; // 速度 -1 到 1
                let directionY = (Math.random() * 2) - 1;
                let color = '#00ffcc'; // 粒子颜色，可自行修改

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // 绘制粒子之间的连线
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    // 如果两个粒子距离小于某个值，则连线
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        opacityValue = 1 - (distance / 20000); // 距离越远线越透明
                        ctx.strokeStyle = 'rgba(0, 255, 204,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            // 清除上一帧，使用带透明度的黑色产生尾迹效果
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        // 运行
        init();
        animate();
    </script>
</body>
</html>
